name: CI and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
      - name: Validate installer syntax
        run: sh -n install.sh

  package:
    name: Build Python package
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Inject release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          pyproject = pathlib.Path("pyproject.toml")
          init = pathlib.Path("mlxer/__init__.py")

          pyproject.write_text(
              re.sub(
                  r'(?m)^version = "[^"]+"$',
                  f'version = "{version}"',
                  pyproject.read_text(),
                  count=1,
              )
          )
          init.write_text(f'__version__ = "{version}"\n')
          PY
      - name: Build package
        run: |
          python -m pip install -e '.[release]'
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [package, publish-github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  binary:
    name: Build standalone binary
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build binary
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          pyproject = pathlib.Path("pyproject.toml")
          init = pathlib.Path("mlxer/__init__.py")

          pyproject.write_text(
              re.sub(
                  r'(?m)^version = "[^"]+"$',
                  f'version = "{version}"',
                  pyproject.read_text(),
                  count=1,
              )
          )
          init.write_text(f'__version__ = "{version}"\n')
          PY
          python -m pip install -e '.[release]'
          pyinstaller --onefile --name mlxer mlxer/__main__.py
          mkdir -p release
          tar -czf release/mlxer-darwin-arm64.tar.gz -C dist mlxer
          (cd release && shasum -a 256 mlxer-darwin-arm64.tar.gz > checksums.txt)
          cp install.sh release/install.sh
      - name: Smoke test binary
        run: ./dist/mlxer --version
      - uses: actions/upload-artifact@v4
        with:
          name: github-release-assets
          path: release/*

  publish-github-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: [binary, package]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: github-release-assets
          path: release
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          fi
