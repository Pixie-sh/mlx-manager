name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          allow-manual-download: true
      - name: Install dependencies
        run: pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
